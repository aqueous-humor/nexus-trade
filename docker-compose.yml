services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/var/www/html
      - /var/www/html/vendor
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      # Local dev key — never use this value in production
      APP_KEY: base64:2fl+Ktvkfl+Fuz4Qp/A75G2RTiWVA/ZoKZvp6fiiM10=
      APP_URL: http://localhost:8000
      FRONTEND_URL: http://localhost:5173
      SANCTUM_STATEFUL_DOMAINS: localhost,localhost:5173
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: nexustrade
      DB_USERNAME: nexustrade
      DB_PASSWORD: secret
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: redis
      MAIL_MAILER: smtp
      MAIL_HOST: mailpit
      MAIL_PORT: 1025
      BROADCAST_CONNECTION: pusher
      PUSHER_APP_ID: nexustrade
      PUSHER_APP_KEY: nexustrade-key
      PUSHER_APP_SECRET: nexustrade-secret
      PUSHER_HOST: soketi
      PUSHER_PORT: 6001
      PUSHER_SCHEME: http
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - nexustrade

  horizon:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    command: php artisan horizon
    volumes:
      - ./backend:/var/www/html
      - /var/www/html/vendor
    environment:
      APP_ENV: local
      APP_KEY: base64:2fl+Ktvkfl+Fuz4Qp/A75G2RTiWVA/ZoKZvp6fiiM10=
      DB_HOST: mysql
      DB_DATABASE: nexustrade
      DB_USERNAME: nexustrade
      DB_PASSWORD: secret
      REDIS_HOST: redis
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
    depends_on:
      - api
    networks:
      - nexustrade

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_PUSHER_APP_KEY: nexustrade-key
      VITE_PUSHER_HOST: localhost
      VITE_PUSHER_PORT: "6001"
      VITE_PUSHER_SCHEME: http
    networks:
      - nexustrade

  mysql:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: nexustrade
      MYSQL_USER: nexustrade
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: rootsecret
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "nexustrade", "-psecret"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nexustrade

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nexustrade

  soketi:
    image: quay.io/soketi/soketi:latest-16-alpine
    ports:
      - "6001:6001"
      - "9601:9601"
    environment:
      SOKETI_DEFAULT_APP_ID: nexustrade
      SOKETI_DEFAULT_APP_KEY: nexustrade-key
      SOKETI_DEFAULT_APP_SECRET: nexustrade-secret
      SOKETI_DEBUG: "0"
    networks:
      - nexustrade

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - nexustrade

volumes:
  mysql_data:
  redis_data:

networks:
  nexustrade:
    driver: bridge
